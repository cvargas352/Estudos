<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Bartleen';
            src: url(Fontes/Bartleen\ Script.otf) format(opentype);
        /* 
            Tipos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (apple advance typography)
            - svg
        */    
        }
        body {
            font-family: 'Bartleen', Helvetica, sans-serif;
            }
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3em;            
            }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Iste officiis temporibus ratione ipsam quaerat facere id dolorem adipisci ea fugiat molestias, repellendus fuga accusantium culpa eius. Non delectus necessitatibus harum?</p>
</body>
</html>
