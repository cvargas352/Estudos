<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <H1>Imagem dinâmica</H1>
    <p>Tente abrir esse site em vários disppositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="Img/foto-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="Img/foto-m.png" type="image/png">
        <img src="Img/foto-g.png" alt="Imagem flexível">
    </picture>
    <H1>Reproduzindo Áudio</H1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio src="media/Into the Depths (Sting) - Jingle Punks.mp3" controls autoplay></audio>
</body>
</html>
